services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PORT=3001
      - DATA_DIR=/data
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=change-me
      - JWT_SECRET=change-this-secret
    volumes:
      - ./data:/data
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"
